            } else if($("#contact-image-div:hover").length != 0){

            } else if($("#home-image-div:hover").length != 0){
                changeImage('home-image', './images/RJ-hover-blue.png')
            } else {
                changeImage('abt-image', './images/about-plain.png')
                changeImage('exp-image', './images/experience-plain.png')
                changeImage('proj-image', './images/projects-plain.png')
                changeImage('contact-image', './images/contact-plain.png')
